<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Desafio To-Do List IA</title>
    <link rel="stylesheet" href="Style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Gerenciador de Tarefas</h1>
            <p>IA no Desenvolvimento de Software</p>
        </header>

        <main>
            <div class="input-card">
                <input type="text" id="taskInput" placeholder="O que precisa ser feito?">
                <select id="prioritySelect">
                    <option value="low">Baixa</option>
                    <option value="medium">Média</option>
                    <option value="high">Alta</option>
                </select>
                <button onclick="addTask()">Adicionar</button>
            </div>

            <ul id="taskList"></ul>
        </main>
    </div>

    <script>
        // Função para cadastrar novas tarefas
        function addTask() {
            const input = document.getElementById('taskInput');
            const priority = document.getElementById('prioritySelect');
            const list = document.getElementById('taskList');

            if (input.value.trim() === "") {
                alert("Por favor, digite uma tarefa!");
                return;
            }

            // Criação do elemento da lista
            const li = document.createElement('li');
            li.className = `task-item priority-${priority.value}`;
            
            // Estrutura interna da tarefa
            li.innerHTML = `
                <span>${input.value}</span>
                <small>Prioridade: ${priority.options[priority.selectedIndex].text}</small>
            `;

            // Lógica para marcar como concluída
            li.onclick = function() {
                this.classList.toggle('completed');
            };

            list.appendChild(li);
            input.value = ""; // Limpa o campo
        }
    </script>
</body>
</html>
